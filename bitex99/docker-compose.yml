version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: zomato_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zomato_user
      POSTGRES_PASSWORD: zomato_pass
      POSTGRES_DB: zomato_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zomato_user -d zomato_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zomato_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zomato_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://zomato_user:zomato_pass@postgres:5432/zomato_db
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
