name: bitex99
description: A hyper-local food delivery platform for small Indian towns.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # ── Networking (replaces Firebase) ────────────────────
  http: ^1.2.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  web_socket_channel: ^2.4.0

  # ── State & preferences ───────────────────────────────
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  connectivity_plus: ^6.0.3
  go_router: ^13.2.0
  firebase_messaging: ^14.9.0
  shared_preferences: ^2.2.2

  # ── UI & utilities ────────────────────────────────────
  audioplayers: ^5.2.1
  url_launcher: ^6.2.2
  image_picker: ^1.0.4
  file_picker: ^8.0.0+1
  cached_network_image: ^3.3.0
  google_sign_in: ^6.2.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
